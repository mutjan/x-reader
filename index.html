<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日科技新闻摘要 | Tech Daily</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f1419;
            color: #e7e9ea;
            line-height: 1.5;
            font-size: 14px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px;
            padding-top: 100px;
        }
        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid #2f3336;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #1d9bf0, #00ba7c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            color: #8899a6;
            font-size: 13px;
        }
        
        /* 日期切换器 */
        .date-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .date-btn {
            background: #1d9bf0;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .date-btn:hover {
            background: #1a8cd8;
        }
        .date-btn:disabled {
            background: #38444d;
            cursor: not-allowed;
        }
        .current-date {
            font-size: 16px;
            font-weight: 600;
            color: #e7e9ea;
            min-width: 100px;
            text-align: center;
        }
        .date-chip {
            padding: 4px 10px;
            background: #2f3336;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
        }
        .date-chip:hover, .date-chip.active {
            background: #1d9bf0;
        }
        .update-time {
            color: #8899a6;
            font-size: 12px;
            margin-top: 5px;
        }
        
        /* 每日摘要区域 */
        .summary-section {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(59, 130, 246, 0.05));
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
        }
        .summary-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #10b981;
            cursor: pointer;
            user-select: none;
            transition: margin-bottom 0.3s ease;
        }
        .summary-header:hover {
            opacity: 0.8;
        }
        .summary-header .icon {
            font-size: 16px;
        }
        .summary-toggle {
            margin-left: auto;
            font-size: 12px;
            color: #8899a6;
            transition: transform 0.3s ease;
        }
        .summary-toggle.collapsed {
            transform: rotate(-90deg);
        }
        .summary-content {
            max-height: 2000px;
            overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.3s ease;
            opacity: 1;
        }
        .summary-content.collapsed {
            max-height: 0;
            opacity: 0;
        }
        .summary-section:has(.summary-content.collapsed) .summary-header {
            margin-bottom: 0;
        }
        .zeitgeist-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0;
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #f59e0b;
            cursor: pointer;
            user-select: none;
            transition: margin-bottom 0.3s ease;
        }
        .zeitgeist-header:hover {
            opacity: 0.8;
        }
        .zeitgeist-header .icon {
            font-size: 16px;
        }
        .zeitgeist-toggle {
            margin-left: auto;
            font-size: 12px;
            color: #8899a6;
            transition: transform 0.3s ease;
        }
        .zeitgeist-toggle.collapsed {
            transform: rotate(-90deg);
        }
        .zeitgeist-content {
            max-height: 2000px;
            overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.3s ease;
            opacity: 1;
        }
        .zeitgeist-content.collapsed {
            max-height: 0;
            opacity: 0;
        }
        .zeitgeist-section:has(.zeitgeist-content.collapsed) .zeitgeist-header {
            margin-bottom: 0;
        }
        .zeitgeist-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px 0 16px 0;
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 12px;
        }
        .summary-card {
            background: rgba(15, 20, 25, 0.6);
            border-radius: 8px;
            padding: 12px;
            border-left: 3px solid #10b981;
        }
        .summary-card:hover {
            background: rgba(16, 185, 129, 0.1);
        }
        .summary-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .summary-type-tag {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            white-space: nowrap;
        }
        .summary-count {
            font-size: 12px;
            color: #8899a6;
            margin-left: auto;
        }
        .summary-items {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .summary-item {
            font-size: 12px;
            color: #e7e9ea;
            line-height: 1.4;
            padding: 4px 0;
            border-bottom: 1px solid rgba(47, 51, 54, 0.5);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .summary-item:last-child {
            border-bottom: none;
        }
        .summary-item .rating-badge {
            font-size: 10px;
            padding: 1px 4px;
            border-radius: 3px;
            margin-right: 6px;
            font-weight: 600;
        }
        .summary-empty {
            color: #8899a6;
            font-size: 12px;
            text-align: center;
            padding: 20px;
        }
        @media (max-width: 768px) {
            .summary-grid {
                grid-template-columns: 1fr;
            }
        }
        .zeitgeist-section {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(236, 72, 153, 0.05));
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
        }
        .zeitgeist-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #c084fc;
        }
        .zeitgeist-header .icon {
            font-size: 16px;
        }
        .zeitgeist-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
        }
        .zeitgeist-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 12px;
            background: rgba(15, 20, 25, 0.6);
            border-radius: 8px;
            border-left: 3px solid #8b5cf6;
        }
        .zeitgeist-item:hover {
            background: rgba(139, 92, 246, 0.1);
        }
        .zeitgeist-main {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .zeitgeist-heat {
            font-size: 18px;
            font-weight: 700;
            min-width: 45px;
            text-align: center;
        }
        .zeitgeist-heat.high { color: #f87171; }
        .zeitgeist-heat.medium { color: #fbbf24; }
        .zeitgeist-heat.low { color: #34d399; }
        .zeitgeist-title {
            flex: 1;
            font-size: 13px;
            font-weight: 600;
            color: #e7e9ea;
        }
        .zeitgeist-trend {
            font-size: 16px;
        }
        .zeitgeist-desc {
            font-size: 11px;
            color: #8899a6;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .zeitgeist-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .zeitgeist-category {
            font-size: 10px;
            padding: 2px 6px;
            background: rgba(139, 92, 246, 0.2);
            border-radius: 4px;
            color: #c084fc;
        }
        .zeitgeist-keywords {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .zeitgeist-keyword {
            font-size: 10px;
            padding: 1px 5px;
            background: rgba(136, 153, 166, 0.15);
            border-radius: 10px;
            color: #8899a6;
        }
        .zeitgeist-empty {
            color: #8899a6;
            font-size: 13px;
            text-align: center;
            padding: 20px;
        }
        
        /* 批量操作栏 */
        .batch-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .batch-btn {
            padding: 8px 16px;
            background: #00ba7c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }
        .batch-btn:hover {
            background: #00a870;
        }
        .batch-btn:disabled {
            background: #38444d;
            cursor: not-allowed;
        }
        .batch-info {
            color: #8899a6;
            font-size: 13px;
            display: flex;
            align-items: center;
        }
        
        /* 浮动工具栏 */
        .floating-toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(15, 20, 25, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #2f3336;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .toolbar-section {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 10px;
            border-right: 1px solid #2f3336;
        }
        .toolbar-section:last-child {
            border-right: none;
        }
        .toolbar-label {
            font-size: 11px;
            color: #8899a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 标签按钮样式 */
        .tab-btn {
            padding: 6px 12px;
            background: #2f3336;
            border: 1px solid #38444d;
            border-radius: 6px;
            color: #e7e9ea;
            cursor: pointer;
            font-size: 12px;
        }
        .tab-btn:hover {
            background: #38444d;
        }
        .tab-btn.active {
            background: #1d9bf0;
            border-color: #1d9bf0;
        }

        /* 排序控件 */
        .sort-controls {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .sort-btn {
            padding: 6px 12px;
            background: #2f3336;
            border: 1px solid #38444d;
            border-radius: 6px;
            color: #e7e9ea;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .sort-btn:hover {
            background: #38444d;
        }
        .sort-btn.active {
            background: #1d9bf0;
            border-color: #1d9bf0;
        }
        
        /* 表格样式 */
        .news-table {
            width: 100%;
            border-collapse: collapse;
            background: #16181c;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #2f3336;
        }
        .news-table th {
            background: #1d9bf0;
            color: white;
            padding: 10px 6px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }
        .news-table th:hover {
            background: #1a8cd8;
        }
        .news-table th:first-child {
            width: 30px;
            text-align: center;
        }
        .news-table th:nth-child(2) {
            width: 60px;
        }
        .news-table th:nth-child(3) {
            width: 70px;
        }
        .news-table th:nth-child(4) {
            width: 22%;
        }
        .news-table th:nth-child(5) {
            width: 22%;
        }
        .news-table th:nth-child(6) {
            width: 12%;
        }
        .news-table th:nth-child(7) {
            width: 10%;
        }
        .news-table th:nth-child(8) {
            width: 15%;
        }
        .news-table th:nth-child(9) {
            width: 45px;
            text-align: center;
        }
        .news-table th:nth-child(10) {
            width: 50px;
            text-align: center;
        }
        .news-table td {
            padding: 10px 6px;
            border-bottom: 1px solid #2f3336;
            vertical-align: top;
        }
        .news-table tr:hover {
            background: #1d9bf010;
        }
        .news-table tr.selected {
            background: #1d9bf020;
        }
        .news-table tr:last-child td {
            border-bottom: none;
        }
        
        /* X事件表格样式 */
        .x-table th {
            background: #8b5cf6;
        }
        .x-table th:hover {
            background: #7c3aed;
        }
        
        /* 复选框 */
        .checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #1d9bf0;
        }
        
        /* 评级标签 */
        .rating-tag {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
        }
        .rating-tag:hover {
            opacity: 0.8;
        }

        /* 类型标签 */
        .type-tag {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            white-space: nowrap;
        }
        .type-product { background: #10b981; color: white; }
        .type-funding { background: #f59e0b; color: white; }
        .type-personnel { background: #8b5cf6; color: white; }
        .type-opinion { background: #ec4899; color: white; }
        .type-industry { background: #3b82f6; color: white; }
        .type-safety { background: #ef4444; color: white; }
        .type-research { background: #06b6d4; color: white; }
        .type-financial { background: #84cc16; color: white; }
        .type-breaking { background: #f97316; color: white; }
        .type-tool { background: #6366f1; color: white; }
        .type-society { background: #14b8a6; color: white; }
        .type-hardware { background: #64748b; color: white; }
        .entity-tag {
            display: inline-block;
            background: #2f3336;
            border: 1px solid #38444d;
            border-radius: 3px;
            color: #8899a6;
            cursor: pointer;
            white-space: nowrap;
        }
        /* 反馈按钮 */
        .feedback-btn {
            background: #2f3336;
            border: 1px solid #38444d;
            color: #8899a6;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            cursor: pointer;
            margin-left: 4px;
        }
        .feedback-btn:hover {
            background: #1d9bf0;
            border-color: #1d9bf0;
            color: white;
        }
        /* 反馈弹窗 */
        .feedback-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .feedback-modal.show {
            display: flex;
        }
        .feedback-content {
            background: #16181c;
            border: 1px solid #2f3336;
            border-radius: 12px;
            padding: 24px;
            width: 90%;
            max-width: 500px;
        }
        .feedback-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .feedback-title {
            font-size: 18px;
            font-weight: 600;
        }
        .feedback-close {
            background: none;
            border: none;
            color: #8899a6;
            font-size: 20px;
            cursor: pointer;
        }
        .feedback-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-label {
            font-size: 13px;
            font-weight: 500;
            color: #e7e9ea;
        }
        .form-select, .form-input, .form-textarea {
            background: #2f3336;
            border: 1px solid #38444d;
            border-radius: 6px;
            padding: 8px 12px;
            color: #e7e9ea;
            font-size: 14px;
        }
        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }
        .form-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        .btn-secondary {
            background: #38444d;
            color: #e7e9ea;
        }
        .btn-primary {
            background: #1d9bf0;
            color: white;
        }
        /* 人工修正标记 */
        .corrected-badge {
            background: #f59e0b;
            color: white;
            font-size: 9px;
            padding: 1px 3px;
            border-radius: 3px;
            margin-left: 4px;
        }
        .entity-tag:hover {
            background: #1d9bf0;
            border-color: #1d9bf0;
            color: white;
        }
        .entity-tag.selected {
            background: #00ba7c;
            border-color: #00ba7c;
            color: white;
        }
        .rating-S {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000;
        }
        .rating-A\+ {
            background: #f4212e;
            color: white;
        }
        .rating-A {
            background: #8b5cf6;
            color: white;
        }
        .rating-B {
            background: #1d9bf0;
            color: white;
        }
        .rating-C {
            background: #6b7280;
            color: white;
        }
        
        /* 标题 */
        .news-title {
            font-weight: 600;
            color: #e7e9ea;
            font-size: 14px;
        }
        
        /* 摘要 */
        .news-summary {
            color: #8899a6;
            font-size: 12px;
            line-height: 1.5;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            max-height: calc(12px * 1.5 * 2); /* 2行高度 */
            transition: all 0.2s ease;
            padding: 4px;
            border-radius: 4px;
        }
        .news-summary:hover {
            -webkit-line-clamp: 20;
            max-height: calc(12px * 1.5 * 20); /* 最多显示20行 */
            background: #1d9bf020;
            overflow: visible;
        }
        
        /* 消息源链接 */
        .source-links {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .source-link {
            display: inline-block;
            padding: 2px 6px;
            background: #2f3336;
            color: #1d9bf0;
            text-decoration: none;
            border-radius: 3px;
            font-size: 10px;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .source-link:hover {
            background: #1d9bf0;
            color: white;
        }
        
        /* 来源数量 */
        .source-count {
            text-align: center;
            font-weight: 600;
            color: #00ba7c;
            font-size: 13px;
        }
        
        /* 消息源链接 */
        .source-links {
            color: #c084fc;
            font-size: 11px;
            line-height: 1.4;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            cursor: help;
        }
        .news-expansion:hover {
            -webkit-line-clamp: unset;
            overflow: visible;
            white-space: normal;
            background: #1d9bf020;
            padding: 4px;
            border-radius: 4px;
        }
        /* 扩展性字段 - 2行截断+hover展开 */
        .expansion-content {
            color: #8899a6;
            font-size: 12px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            max-height: calc(12px * 1.4 * 2); /* 2行高度 */
            transition: all 0.2s ease;
            padding: 4px;
            border-radius: 4px;
        }
        .expansion-content:hover {
            -webkit-line-clamp: 20;
            max-height: calc(12px * 1.4 * 20); /* 最多显示20行 */
            background: #1d9bf020;
            overflow: visible;
        }
        /* 实体列 - 自适应标签数量，多时缩小字体 */
        .entities-container {
            color: #8899a6;
            font-size: 12px;
            line-height: 1.4;
            display: flex;
            flex-wrap: wrap;
            gap: 2px 4px;
            padding: 4px;
            border-radius: 4px;
        }
        .entities-container:hover {
            background: #1d9bf020;
        }
        /* 根据标签数量动态调整字体大小 */
        .entities-container.count-1 .entity-tag,
        .entities-container.count-2 .entity-tag { font-size: 10px; padding: 2px 6px; }
        .entities-container.count-3 .entity-tag,
        .entities-container.count-4 .entity-tag { font-size: 9px; padding: 1px 4px; }
        .entities-container.count-5 .entity-tag,
        .entities-container.count-6 .entity-tag { font-size: 8px; padding: 1px 3px; }

    <script>
        // ==================== 数据加载 ====================
        let NEWS_ARCHIVE = {};
        let EVENTS = [];
        let UPCOMING_EVENTS = [];
        let ZEITGEIST = [];
        let currentTab = 'events'; // news/events — 默认显示事件追踪
        let selectedItems = new Set(); // 存储选中的项目ID（新闻或事件）

        // 提取URL中的域名，去掉.com后缀，Twitter/X显示为x(用户名)
        function extractDomain(url) {
            if (!url) return '链接';
            try {
                const urlObj = new URL(url);
                const domain = urlObj.hostname.replace(/^www\./, '');
                // Twitter/X 链接显示为 x(用户名)
                if (domain === 'twitter.com' || domain === 'x.com') {
                    const pathParts = urlObj.pathname.split('/').filter(p => p);
                    if (pathParts.length > 0) {
                        return `x(${pathParts[0]})`;
                    }
                    return 'x';
                }
                return domain.replace(/\.com$/, ''); // 移除.com后缀
            } catch (e) {
                // 正则提取作为fallback
                const match = url.match(/^https?:\/\/([^\/]+)/);
                if (match) {
                    const domain = match[1].replace(/^www\./, '');
                    if (domain === 'twitter.com' || domain === 'x.com') {
                        const usernameMatch = url.match(/^https?:\/\/[^\/]+\/([^\/]+)/);
                        if (usernameMatch) {
                            return `x(${usernameMatch[1]})`;
                        }
                        return 'x';
                    }
                    return domain.replace(/\.com$/, '');
                }
                return '链接';
            }
        }

        // 加载数据
        async function loadData() {
            try {
                // 第一步：优先加载新闻数据，立即渲染
                const newsResponse = await fetch('data/news_data.json?v=' + Date.now());
                if (!newsResponse.ok) throw new Error('Failed to load news data');
                const newsData = await newsResponse.json();
                if (newsData.news) {
                    NEWS_ARCHIVE = newsData.news;
                } else {
                    NEWS_ARCHIVE = newsData;
                }

                // 新闻加载完成后立即渲染，不等事件数据
                currentDate = getLatestDate();
                renderTabs();
                switchTab(currentTab);

                // 第二步：后台加载事件数据（不阻塞首屏渲染）
                loadEventsAsync();
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('news-content').innerHTML =
                    `<div class="error-state">❌ 数据加载失败: ${error.message}</div>`;
            }
        }

        // 后台异步加载事件分组数据
        async function loadEventsAsync() {
            try {
                const resp = await fetch('data/event_groups.json?v=' + Date.now());
                if (!resp.ok) {
                    EVENTS = [];
                    return;
                }
                const eventsData = await resp.json();
                const rawEventGroups = eventsData.event_groups || eventsData || [];

                // 创建新闻查找字典
                const allNews = {};
                Object.values(NEWS_ARCHIVE).forEach(dateNews => {
                    dateNews.forEach(item => {
                        allNews[item.id] = item;
                    });
                });

                // 处理事件分组，关联新闻数据
                EVENTS = rawEventGroups.map(group => {
                    const newsList = group.news_ids
                        .map(newsId => allNews[newsId])
                        .filter(Boolean);
                    if (newsList.length === 0) return null;
                    newsList.sort((a, b) => a.timestamp - b.timestamp);

                    const timestamps = newsList.map(item => item.timestamp);
                    const scores = newsList.map(item => item.score || 0);
                    const ratings = newsList.map(item => item.rating || 'C');
                    const entities = [...new Set(newsList.flatMap(item => item.entities || []))];
                    const mainNews = newsList[0];

                    return {
                        id: group.group_id,
                        title: group.event_title,
                        news_count: newsList.length,
                        start_time: Math.min(...timestamps),
                        end_time: Math.max(...timestamps),
                        max_score: Math.max(...scores),
                        max_grade: ratings.sort((a, b) => getRatingOrder(a) - getRatingOrder(b))[0],
                        entities: entities,
                        news_list: newsList,
                        main_news_url: mainNews ? mainNews.url : '',
                        main_news_summary: mainNews ? mainNews.summary : ''
                    };
                }).filter(Boolean);

                console.log(`Loaded ${EVENTS.length} events from event_groups.json`);
                renderTabs();
                if (currentTab === 'events') renderCurrentView();
            } catch (e) {
                console.warn('事件数据加载失败:', e);
                EVENTS = [];
            }
        }

        // 后台异步加载时代情绪数据
        async function loadZeitgeistAsync() {
            try {
                const resp = await fetch('config/zeitgeist.json?v=' + Date.now());
                if (!resp.ok) return;
                const data = await resp.json();
                ZEITGEIST = data.zeitgeist || [];
                renderZeitgeist();
            } catch (e) {
                console.warn('时代情绪数据加载失败:', e);
            }
        }

        // ==================== 全局状态 ====================
        let currentDate = '';
        let currentSort = { field: 'rating', order: 'desc' };
        let filteredRating = null;
        let selectedEntity = null;

        // 事件视图状态
        let eventFilters = {
            search: '',
            minScore: 0,
            minNewsCount: 0,
            entity: null
        };
        let eventSort = { field: 'end_time', order: 'desc' };

        // 事件表格状态
        let expandedEvents = new Set(); // 存储已展开的事件ID
        let collapsedEvents = new Set();

        // ==================== 标签切换 ====================
        function renderTabs() {
            // 只有存在事件时才显示事件标签
            const tabEvents = document.getElementById('tabEvents');
            if (EVENTS.length > 0) {
                tabEvents.style.display = 'inline-block';
            } else {
                tabEvents.style.display = 'none';
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            // 更新标签状态
            document.getElementById('tabNews').className = 'tab-btn' + (tab === 'news' ? ' active' : '');
            document.getElementById('tabEvents').className = 'tab-btn' + (tab === 'events' ? ' active' : '');

            // 显示/隐藏工具栏部分
            if (tab === 'news') {
                document.getElementById('dateToolbarSection').style.display = 'flex';
                document.getElementById('actionsToolbarSection').style.display = 'flex';
                document.getElementById('sortToolbarSection').style.display = 'flex';
                document.getElementById('news-content').style.display = 'block';
                document.getElementById('events-content').style.display = 'none';
                renderNews();
            } else {
                document.getElementById('dateToolbarSection').style.display = 'none';
                document.getElementById('actionsToolbarSection').style.display = 'flex';
                document.getElementById('sortToolbarSection').style.display = 'flex';
                document.getElementById('news-content').style.display = 'none';
                document.getElementById('events-content').style.display = 'block';
                renderEvents();
            }
            updateBatchButtons();
            updateSortButtons();
        }

        function renderCurrentView() {
            if (currentTab === 'news') {
                renderNews();
            } else {
                renderEvents();
            }
        }

        // ==================== 事件展示功能 ====================
        function getFilteredAndSortedEvents() {
            let filtered = [...EVENTS];

            // 应用筛选
            if (eventFilters.search) {
                const searchTerm = eventFilters.search.toLowerCase();
                filtered = filtered.filter(event => {
                    // 搜索事件标题
                    if (event.title.toLowerCase().includes(searchTerm)) return true;
                    // 搜索实体
                    if (event.entities.some(e => e.toLowerCase().includes(searchTerm))) return true;
                    // 搜索新闻标题
                    if (event.news_list.some(n => n.title.toLowerCase().includes(searchTerm))) return true;
                    return false;
                });
            }

            // 最低评分筛选
            if (eventFilters.minScore > 0) {
                filtered = filtered.filter(event => event.max_score >= eventFilters.minScore);
            }

            // 最少新闻数量筛选
            if (eventFilters.minNewsCount > 0) {
                filtered = filtered.filter(event => event.news_count >= eventFilters.minNewsCount);
            }

            // 实体筛选
            if (eventFilters.entity) {
                filtered = filtered.filter(event => event.entities.includes(eventFilters.entity));
            }

            // 应用排序
            filtered.sort((a, b) => {
                let valA, valB;
                switch (eventSort.field) {
                    case 'max_score':
                        valA = a.max_score;
                        valB = b.max_score;
                        break;
                    case 'news_count':
                        valA = a.news_count;
                        valB = b.news_count;
                        break;
                    case 'start_time':
                        valA = a.start_time;
                        valB = b.start_time;
                        break;
                    case 'end_time':
                        valA = a.end_time;
                        valB = b.end_time;
                        break;
                    case 'title':
                        valA = a.title.toLowerCase();
                        valB = b.title.toLowerCase();
                        break;
                    case 'max_grade':
                        // 评级排序：S > A > B > C > D
                        const gradeOrder = { 'S': 6, 'A': 5, 'B': 4, 'C': 3, 'D': 2, 'E': 1 };
                        valA = gradeOrder[a.max_grade] || 0;
                        valB = gradeOrder[b.max_grade] || 0;
                        break;
                    case 'type':
                        // 类型排序：取第一条新闻的类型
                        const typeA = a.news_list && a.news_list[0] ? a.news_list[0].type : '';
                        const typeB = b.news_list && b.news_list[0] ? b.news_list[0].type : '';
                        valA = typeA.toLowerCase();
                        valB = typeB.toLowerCase();
                        break;
                    case 'entities':
                        // 实体排序：按实体数量排序
                        valA = (a.entities || []).length;
                        valB = (b.entities || []).length;
                        break;
                    default:
                        valA = a.max_score;
                        valB = b.max_score;
                }

                if (typeof valA === 'string' && typeof valB === 'string') {
                    return eventSort.order === 'asc'
                        ? valA.localeCompare(valB)
                        : valB.localeCompare(valA);
                } else {
                    return eventSort.order === 'asc' ? valA - valB : valB - valA;
                }
            });

            return filtered;
        }

        function toggleEventCollapse(eventId) {
            if (collapsedEvents.has(eventId)) {
                collapsedEvents.delete(eventId);
            } else {
                collapsedEvents.add(eventId);
            }
            renderEvents();
        }

        function toggleAllEvents() {
            const filteredEvents = getFilteredAndSortedEvents();
            const allCollapsed = filteredEvents.every(e => collapsedEvents.has(e.id));

            if (allCollapsed) {
                filteredEvents.forEach(e => collapsedEvents.delete(e.id));
            } else {
                filteredEvents.forEach(e => collapsedEvents.add(e.id));
            }
            renderEvents();
        }

        function filterEventsByEntity(entity) {
            if (eventFilters.entity === entity) {
                eventFilters.entity = null;
            } else {
                eventFilters.entity = entity;
            }
            renderEvents();
        }

        function sortEventsBy(field) {
            // 支持的排序字段列表
            const supportedFields = ['max_score', 'max_grade', 'type', 'title', 'entities', 'news_count', 'start_time', 'end_time'];

            // 验证字段，不支持的字段默认使用max_score
            if (!supportedFields.includes(field)) {
                field = 'max_score';
            }

            if (eventSort.field === field) {
                eventSort.order = eventSort.order === 'asc' ? 'desc' : 'asc';
            } else {
                eventSort.field = field;
                eventSort.order = 'desc';
            }

            // 同步更新排序下拉框的选中值
            const sortSelect = document.querySelector('.event-control-select[onchange*="sortEventsBy"]');
            if (sortSelect) {
                sortSelect.value = eventSort.field;
            }

            updateSortButtons();
            renderEvents();
        }

        // 切换单个事件的选择状态
        function toggleEventSelection(eventId) {
            if (selectedItems.has(eventId)) {
                selectedItems.delete(eventId);
            } else {
                selectedItems.add(eventId);
            }
            updateBatchButtons();
        }

        // 切换全选/取消全选事件
        function toggleSelectAllEvents(checkbox) {
            const filteredEvents = getFilteredAndSortedEvents();
            if (checkbox.checked) {
                filteredEvents.forEach(event => selectedItems.add(event.id));
            } else {
                filteredEvents.forEach(event => selectedItems.delete(event.id));
            }
            updateBatchButtons();
        }

        // 更新批量操作按钮状态
        function updateBatchButtons() {
            let selectedCount = 0;

            if (currentTab === 'news') {
                // 新闻视图：计算选中的新闻数量
                const newsList = NEWS_ARCHIVE[currentDate] || [];
                const displayList = getSortedAndFilteredNews(newsList);
                selectedCount = displayList.filter((_, index) => selectedItems.has(`${currentDate}-${index}`)).length;

                // 更新全选按钮文本
                const selectAllBtn = document.getElementById('selectAllBtn');
                selectAllBtn.textContent =
                    selectedCount === displayList.length && displayList.length > 0 ? '取消全选' : '全选';
            } else {
                // 事件视图：计算选中的事件数量
                const filteredEvents = getFilteredAndSortedEvents();
                selectedCount = filteredEvents.filter(event => selectedItems.has(event.id)).length;

                // 更新全选按钮文本
                const selectAllBtn = document.getElementById('selectAllBtn');
                const allSelected = filteredEvents.length > 0 && filteredEvents.every(event => selectedItems.has(event.id));
                selectAllBtn.textContent = allSelected ? '取消全选' : '全选';

                // 更新表格中的复选框状态
                const checkboxes = document.querySelectorAll('.event-table .checkbox');
                checkboxes.forEach(checkbox => {
                    const onchange = checkbox.getAttribute('onchange') || '';
                    const match = onchange.match(/'([^']+)'/);
                    if (match) {
                        const eventId = match[1];
                        checkbox.checked = selectedItems.has(eventId);
                    }
                });

                // 更新表头的全选复选框状态
                const headerCheckbox = document.querySelector('.event-table thead .checkbox');
                if (headerCheckbox) {
                    headerCheckbox.checked = filteredEvents.length > 0 && filteredEvents.every(event => selectedItems.has(event.id));
                }
            }

            document.getElementById('selectedCount').textContent = selectedCount;
            document.getElementById('copySelectedBtn').disabled = selectedCount === 0;
        }

        // 全选按钮点击处理
        function selectAll() {
            if (currentTab === 'news') {
                // 新闻视图的全选逻辑待实现
                return;
            }

            const filteredEvents = getFilteredAndSortedEvents();
            const allSelected = filteredEvents.length > 0 && filteredEvents.every(event => selectedItems.has(event.id));

            if (allSelected) {
                // 取消全选
                filteredEvents.forEach(event => selectedItems.delete(event.id));
            } else {
                // 全选
                filteredEvents.forEach(event => selectedItems.add(event.id));
            }

            updateBatchButtons();
        }

        // 清空选择
        function clearSelection() {
            selectedItems.clear();
            updateBatchButtons();
        }

        let _activeEventInput = null; // 追踪事件控件中当前聚焦的输入元素

        function updateEventSearch(e) {
            eventFilters.search = e.target.value;
            renderEvents();
        }

        function updateMinScore(e) {
            eventFilters.minScore = parseInt(e.target.value) || 0;
            renderEvents();
        }

        function updateMinNewsCount(e) {
            eventFilters.minNewsCount = parseInt(e.target.value) || 0;
            renderEvents();
        }

        function renderEvents() {
            const content = document.getElementById('events-content');

            if (EVENTS.length === 0) {
                content.innerHTML = `<div class="empty-state"><p>📭 暂无事件数据</p></div>`;
                return;
            }

            const filteredEvents = getFilteredAndSortedEvents();

            // 事件分级颜色映射
            const getRatingClass = (rating) => {
                const map = { 'S': 'rating-S', 'A+': 'rating-A\+', 'A': 'rating-A', 'B': 'rating-B', 'C': 'rating-C' };
                return map[rating] || 'rating-C';
            };

            // 类型映射
            const typeMap = {
                'product': '产品发布', 'funding': '融资上市', 'personnel': '人事变动',
                'opinion': '观点访谈', 'industry': '行业动态', 'safety': '安全伦理',
                'research': '研究成果', 'financial': '商业数据', 'breaking': '突发事件',
                'tool': '工具技巧', 'society': '社会影响', 'hardware': '硬件基建'
            };

            // 格式化时间
            const formatTime = (timestamp) => {
                if (!timestamp) return '--';
                const date = new Date(typeof timestamp === 'number' ? timestamp * 1000 : timestamp);
                return date.toLocaleString('zh-CN', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });

            content.innerHTML = `

                            <option value="3" ${eventFilters.minNewsCount === 3 ? 'selected' : ''}>>=3条</option>

                            <option value="start_time" ${eventSort.field === 'start_time' ? 'selected' : ''}>开始时间</option>
                            <option value="end_time" ${eventSort.field === 'end_time' ? 'selected' : ''}>更新时间</option>

                    </div>

                    <button class="event-toggle-all-btn" onclick="toggleAllEvents()">
                        ${filteredEvents.every(e => expandedEvents.has(e.id)) ? '全部折叠' : '全部展开'}

                </div>

                <table class="event-table">
                    <thead>

                            </th>

                                : null;

        // ==================== 新闻列表功能 ====================

        function formatDate(dateStr) {

            const date = new Date(dateStr);
            if (isNaN(date.getTime())) return '--';
            return `${date.getMonth() + 1}/${date.getDate()}`;

        function getRatingClass(rating) {
            const map = { 'S': 'rating-S', 'A+': 'rating-A\+', 'A': 'rating-A', 'B': 'rating-B', 'C': 'rating-C' };
            return map[rating] || 'rating-C';
        }

        function getRatingOrder(rating) {
            const order = { 'S': 1, 'A+': 2, 'A': 3, 'B': 4, 'C': 5 };
            return order[rating] || 6;
        }

            if (currentTab === 'events') {
                // 事件视图的排序字段反向映射
                const fieldMap = {
                    'max_grade': 'rating',

        function filterByRating(rating) {
            filteredRating = filteredRating === rating ? null : rating;

        function getSortedAndFilteredNews(newsList) {
            let result = [...newsList];
            if (filteredRating) {
                result = result.filter(item => item.rating === filteredRating);
            }

            // 如果选中了实体，将包含该实体的条目排在最前面
            if (selectedEntity) {
                result.sort((a, b) => {
                    const hasEntityA = a.entities && a.entities.includes(selectedEntity);
                    const hasEntityB = b.entities && b.entities.includes(selectedEntity);
                    if (hasEntityA && !hasEntityB) return -1;
                    if (!hasEntityA && hasEntityB) return 1;
                    return 0;
                });
            } else if (currentSort.field === 'rating') {
                result.sort((a, b) => {
                    const orderA = getRatingOrder(a.rating);
                    const orderB = getRatingOrder(b.rating);
                    if (orderA !== orderB) {
                        return currentSort.order === 'asc' ? orderB - orderA : orderA - orderB;
                    }
                    // 评级相同，按时间倒序（最新的排前面）
                    const timeA = a.timestamp || 0;
                    const timeB = b.timestamp || 0;
                    return timeB - timeA;
                });
            } else if (currentSort.field === 'type') {
                result.sort((a, b) => {
                    const typeA = (a.typeName || a.type || '').toLowerCase();
                    const typeB = (b.typeName || b.type || '').toLowerCase();
                    return currentSort.order === 'asc'
                        ? typeA.localeCompare(typeB)
                        : typeB.localeCompare(typeA);
                });
            } else if (currentSort.field === 'entities') {
                result.sort((a, b) => {
                    const entityA = (a.entities && a.entities[0]) || '';
                    const entityB = (b.entities && b.entities[0]) || '';
                    return currentSort.order === 'asc'
                        ? entityA.localeCompare(entityB)
                        : entityB.localeCompare(entityA);
                });
            } else if (currentSort.field === 'sources') {
                result.sort((a, b) => currentSort.order === 'asc' ? a.sources - b.sources : b.sources - a.sources);
            } else if (currentSort.field === 'time' || !currentSort.field) {
                // 默认按时间排序（最新的在上面）
                result.sort((a, b) => {
                    const timeA = a.timestamp || 0;
                    const timeB = b.timestamp || 0;
                    const order = currentSort.field === 'time' ? currentSort.order : 'desc';
                    return order === 'asc' ? timeA - timeB : timeB - timeA;
                });
            }
            return result;
        }

            if (currentTab === 'news') {
                const newsList = NEWS_ARCHIVE[currentDate] || [];
                const displayList = getSortedAndFilteredNews(newsList);
                const selectedNews = displayList.filter((_, index) => selectedItems.has(`${currentDate}-${index}`));

                count = selectedEvents.length;

                textToCopy = selectedEvents.map(event => {

                    return `${event.title}\n${newsLinks}`;

        function renderSourceLinks(links) {
            if (!links || links.length === 0) return '-';
            return links.map(link => {
                // x/Twitter链接用extractDomain提取用户名
                let name;
                try {
                    const urlObj = new URL(link.url);
                    if (urlObj.hostname === 'twitter.com' || urlObj.hostname === 'x.com') {
                        name = extractDomain(link.url);
                    }
                } catch(e) {}
                if (!name) {
                    name = link.name.startsWith('x(') ? link.name : link.name.replace(/\s*\([^)]*\)/g, '');
                }
                return `<a href="${link.url}" target="_blank" class="source-link" title="${link.url}">${name}</a>`;
            }).join('');
        }

        function renderDailySummary() {
            const section = document.getElementById('summarySection');
            const grid = document.getElementById('summaryGrid');
            const count = document.getElementById('summaryCount');

            const newsList = NEWS_ARCHIVE[currentDate] || [];

            if (newsList.length === 0) {
                section.style.display = 'none';
                return;
            }

            // 按类型分组
            const typeGroups = {};
            newsList.forEach(item => {
                const type = item.type || 'other';
                const typeName = getTypeDisplayName(type);
                if (!typeGroups[type]) {
                    typeGroups[type] = {
                        type: type,
                        typeName: typeName,
                        items: []
                    };
                }
                typeGroups[type].items.push(item);
            });

            // 按类型优先级排序
            const typePriority = ['research', 'breaking', 'product', 'funding', 'personnel', 'industry', 'financial', 'hardware', 'safety', 'tool', 'opinion', 'society', 'other'];
            const sortedTypes = Object.values(typeGroups).sort((a, b) => {
                const priorityA = typePriority.indexOf(a.type);
                const priorityB = typePriority.indexOf(b.type);
                if (priorityA !== priorityB) {
                    return (priorityA === -1 ? 999 : priorityA) - (priorityB === -1 ? 999 : priorityB);
                }
                // 同类型按数量排序
                return b.items.length - a.items.length;
            });

            section.style.display = 'block';
            count.textContent = `${newsList.length} 条 · ${sortedTypes.length} 个分类`;

            // 类型颜色映射
            const typeColors = {

                'breaking': '#f97316',   // 突发事件 - 橙色
                'product': '#10b981',    // 产品发布 - 绿色
                'funding': '#f59e0b',    // 融资上市 - 琥珀色
                'personnel': '#8b5cf6',  // 人事变动 - 紫色
                'industry': '#3b82f6',   // 行业动态 - 蓝色
                'financial': '#84cc16',  // 商业数据 - 石灰绿
                'hardware': '#64748b',   // 硬件基建 - 石板灰
                'safety': '#ef4444',     // 安全伦理 - 红色
                'tool': '#6366f1',       // 工具技巧 - 靛蓝色
                'opinion': '#ec4899',    // 观点访谈 - 粉色

                'other': '#6b7280'       // 其他 - 灰色

            grid.innerHTML = sortedTypes.map(group => {

                        <div class="zeitgeist-desc">${z.description}</div>
                        <div class="zeitgeist-meta">
                            <span class="zeitgeist-category">${categoryName}</span>
                            <span class="zeitgeist-keywords">${keywordsHtml}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
