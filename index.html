<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日科技新闻摘要 | Tech Daily</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f1419;
            color: #e7e9ea;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid #2f3336;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #1d9bf0, #00ba7c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            color: #8899a6;
            font-size: 16px;
        }
        .update-time {
            color: #8899a6;
            font-size: 14px;
            margin-top: 10px;
        }
        .section {
            margin-bottom: 40px;
        }
        .section-title {
            font-size: 24px;
            color: #1d9bf0;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #1d9bf0;
        }
        .news-item {
            background: #16181c;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            border: 1px solid #2f3336;
            transition: border-color 0.2s;
        }
        .news-item:hover {
            border-color: #1d9bf0;
        }
        .news-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #e7e9ea;
        }
        .news-title a {
            color: inherit;
            text-decoration: none;
        }
        .news-title a:hover {
            color: #1d9bf0;
        }
        .news-meta {
            display: flex;
            gap: 15px;
            color: #8899a6;
            font-size: 13px;
            margin-bottom: 10px;
        }
        .news-source {
            color: #00ba7c;
        }
        .news-summary {
            color: #c4cfd6;
            font-size: 15px;
            line-height: 1.7;
        }
        .tag {
            display: inline-block;
            padding: 4px 10px;
            background: #1d9bf020;
            color: #1d9bf0;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
            margin-right: 5px;
        }
        .hot-badge {
            display: inline-block;
            padding: 2px 8px;
            background: #f4212e;
            color: white;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 8px;
            vertical-align: middle;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8899a6;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid #2f3336;
            border-top-color: #1d9bf0;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        footer {
            text-align: center;
            padding: 40px 0;
            color: #8899a6;
            font-size: 13px;
            border-top: 1px solid #2f3336;
            margin-top: 40px;
        }
        .rss-link {
            color: #1d9bf0;
            text-decoration: none;
        }
        .rss-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📰 每日科技新闻摘要</h1>
            <p class="subtitle">Tech Daily Digest from Inoreader</p>
            <p class="update-time">最后更新：<span id="updateTime">加载中...</span></p>
        </header>

        <main id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p style="margin-top: 15px; color: #8899a6;">正在加载今日新闻...</p>
            </div>
        </main>

        <footer>
            <p>数据来源：Inoreader RSS | 每日 07:30 自动更新</p>
            <p style="margin-top: 8px;">由 OpenClaw 自动生成 · 托管于 GitHub Pages</p>
        </footer>
    </div>

    <script>
        // 新闻数据 - 将被定时任务自动替换
        const NEWS_DATA = {
            "date": "2026-02-25",
            "updateTime": "2026-02-25 07:30",
            "hot": [],
            "tech": [],
            "ai": [],
            "business": []
        };

        function formatTime(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function renderNewsItem(item, isHot = false) {
            const hotBadge = isHot ? '<span class="hot-badge">HOT</span>' : '';
            const tags = item.tags ? item.tags.map(t => `<span class="tag">${t}</span>`).join('') : '';
            
            return `
                <article class="news-item">
                    <h3 class="news-title">
                        <a href="${item.url}" target="_blank" rel="noopener">${item.title}${hotBadge}</a>
                    </h3>
                    <div class="news-meta">
                        <span class="news-source">${item.source || 'Unknown'}</span>
                        <span>${item.time || ''}</span>
                    </div>
                    <p class="news-summary">${item.summary || ''}</p>
                    ${tags}
                </article>
            `;
        }

        function renderSection(title, items, isHot = false) {
            if (!items || items.length === 0) return '';
            
            return `
                <section class="section">
                    <h2 class="section-title">${title}</h2>
                    ${items.map(item => renderNewsItem(item, isHot)).join('')}
                </section>
            `;
        }

        function render() {
            const content = document.getElementById('content');
            const updateTime = document.getElementById('updateTime');
            
            updateTime.textContent = formatTime(NEWS_DATA.updateTime);
            
            if (!NEWS_DATA.hot.length && !NEWS_DATA.tech.length && !NEWS_DATA.ai.length && !NEWS_DATA.business.length) {
                content.innerHTML = `
                    <div class="empty-state">
                        <p style="font-size: 48px; margin-bottom: 20px;">📭</p>
                        <p>暂无今日新闻数据</p>
                        <p style="margin-top: 10px; font-size: 14px;">请稍后再试，或联系管理员更新</p>
                    </div>
                `;
                return;
            }
            
            content.innerHTML = `
                ${renderSection('🔥 热点头条', NEWS_DATA.hot, true)}
                ${renderSection('🤖 AI & 大模型', NEWS_DATA.ai)}
                ${renderSection('💻 科技动态', NEWS_DATA.tech)}
                ${renderSection('💼 商业资讯', NEWS_DATA.business)}
            `;
        }

        // 页面加载时渲染
        render();
    </script>
</body>
</html>
